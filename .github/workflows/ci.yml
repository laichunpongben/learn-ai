name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap source-only checks share one runner and one `npm ci`. Each was its
  # own job before (type, lint, unit) but they each spent ~13s of the ~20s
  # wall time in setup, not real work — running them serially in one runner
  # cuts CPU by ~50s/run with no change in overall wall-clock (a11y stays
  # the bottleneck at ~44s).
  static:
    name: Static checks (type, lint, unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run test

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify expected page count
        run: |
          built=$(find dist -name "index.html" | wc -l | tr -d ' ')
          echo "Built $built HTML pages"
          if [ "$built" -lt 20 ]; then
            echo "::error::Expected at least 20 pages, got $built"
            exit 1
          fi
      - name: Verify internal links
        run: npm run links

  smoke:
    name: UI smoke (real browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: ./.github/actions/start-preview-chrome
      - name: Run UI smoke
        run: npm run smoke
        env:
          SMOKE_URL: http://localhost:4321
          CDP_URL: http://localhost:9333

  a11y:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: ./.github/actions/start-preview-chrome
      - name: Run a11y scan
        run: npm run a11y
        env:
          SMOKE_URL: http://localhost:4321
          CDP_URL: http://localhost:9333
