name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  SITE_URL: https://learnai.databookman.com

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Split by concern, not by check: "does the source compile" vs. "does the
# running site work for a user." Two jobs run in parallel; each owns one
# `npm ci` and (where relevant) one `npm run build`. The previous 4-job
# layout spent ~152s of CPU per run for the same 44s wall-clock; the 2-job
# layout spends ~103s for ~59s wall-clock — ~32% less CPU, 15s slower PR
# feedback.
jobs:
  # "Does the source compile and pass static checks?" Type + lint + unit +
  # build + page-count + link-verify all share one runner.
  source:
    name: Source (type, lint, unit, build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Verify expected page count
        run: |
          built=$(find dist -name "index.html" | wc -l | tr -d ' ')
          echo "Built $built HTML pages"
          if [ "$built" -lt 20 ]; then
            echo "::error::Expected at least 20 pages, got $built"
            exit 1
          fi
      - name: Verify internal links
        run: npm run links

  # "Does the running site work for a user?" Smoke + a11y share one build
  # and one Chrome instance via the start-preview-chrome composite action.
  browser:
    name: Browser (smoke + a11y)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: ./.github/actions/start-preview-chrome
      - name: Run UI smoke
        run: npm run smoke
        env:
          SMOKE_URL: http://localhost:4321
          CDP_URL: http://localhost:9333
      - name: Run a11y scan
        run: npm run a11y
        env:
          SMOKE_URL: http://localhost:4321
          CDP_URL: http://localhost:9333
